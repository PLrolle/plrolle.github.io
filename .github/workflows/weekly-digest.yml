name: Weekly digest

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      week_offset:
        description: 'Week offset (0 = current, 1 = last week)'
        required: false
        default: '0'

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic python-dateutil

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WEEK_OFFSET: ${{ github.event.inputs.week_offset || '0' }}
        run: python3 .github/scripts/generate_digest.py

      - name: Commit and push digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          git diff --cached --quiet || git commit -m "weekly digest $(date +%Y-%m-%d)"
          git push
